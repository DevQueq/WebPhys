<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>ModelGPU2 – WebGPU Physics</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0a0f; overflow:hidden; font-family:'Segoe UI',sans-serif; }
  canvas { display:block; }
  #ui {
    position:fixed; top:20px; left:20px; color:#fff;
    background:rgba(255,255,255,0.06); backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,0.12); border-radius:16px;
    padding:20px 24px; min-width:230px;
    max-height:calc(100vh - 40px); overflow-y:auto; z-index:10;
  }
  #ui h2 { font-size:14px; font-weight:600; color:#34d399; margin-bottom:4px; letter-spacing:.08em; text-transform:uppercase; }
  .badge { display:inline-block; background:linear-gradient(135deg,#059669,#10b981); color:#fff; font-size:9px; font-weight:700; padding:2px 7px; border-radius:20px; letter-spacing:.06em; margin-bottom:12px; }
  .stat { display:flex; justify-content:space-between; font-size:13px; margin-bottom:8px; color:#cbd5e1; }
  .stat span { color:#f8fafc; font-weight:600; }
  .divider { border:none; border-top:1px solid rgba(255,255,255,0.08); margin:14px 0; }
  .btn { display:block; width:100%; padding:9px 0; margin-top:8px; border:none; border-radius:10px; font-size:13px; font-weight:600; cursor:pointer; transition:all .2s; }
  .btn-primary { background:linear-gradient(135deg,#059669,#34d399); color:#fff; }
  .btn-primary:hover { transform:translateY(-1px); box-shadow:0 4px 20px rgba(52,211,153,0.4); }
  .btn-secondary { background:rgba(255,255,255,0.08); color:#e2e8f0; border:1px solid rgba(255,255,255,0.1); }
  .btn-secondary:hover { background:rgba(255,255,255,0.13); }
  label { font-size:12px; color:#94a3b8; display:block; margin-bottom:4px; margin-top:10px; }
  input[type=range]  { width:100%; accent-color:#34d399; }
  input[type=number] { width:100%; padding:7px 10px; border-radius:8px; border:1px solid rgba(255,255,255,0.12); background:rgba(255,255,255,0.07); color:#f8fafc; font-size:13px; margin-bottom:2px; }
  .toggle-row { display:flex; align-items:center; justify-content:space-between; margin-top:10px; }
  .toggle-label { font-size:12px; color:#94a3b8; }
  .toggle { position:relative; width:36px; height:20px; background:rgba(255,255,255,0.12); border-radius:10px; cursor:pointer; transition:background .2s; border:none; flex-shrink:0; }
  .toggle.on { background:#059669; }
  .toggle::after { content:''; position:absolute; width:14px; height:14px; border-radius:50%; background:#fff; top:3px; left:3px; transition:left .2s; }
  .toggle.on::after { left:19px; }
  #status { font-size:11px; color:#6ee7b7; margin-top:4px; margin-bottom:10px; word-break:break-all; }
  #nowebgpu { display:none; position:fixed; inset:0; background:rgba(10,10,15,.97); color:#fff; align-items:center; justify-content:center; flex-direction:column; text-align:center; padding:40px; z-index:100; }
  #nowebgpu h2 { color:#f87171; font-size:22px; margin-bottom:12px; }
  #nowebgpu p  { color:#94a3b8; max-width:500px; line-height:1.7; margin-bottom:8px; }
  #nowebgpu code { background:rgba(255,255,255,0.08); padding:2px 8px; border-radius:5px; }
  #controls { position:fixed; bottom:20px; left:50%; transform:translateX(-50%); color:rgba(255,255,255,.35); font-size:12px; pointer-events:none; }
</style>
</head>
<body>

<div id="nowebgpu">
  <h2>⚠ WebGPU Not Available</h2>
  <p>This requires <strong>Chrome 113+</strong> or <strong>Edge 113+</strong> on desktop with WebGPU enabled.</p>
  <p>Try: <code>chrome://flags/#enable-unsafe-webgpu</code> → Enable → Relaunch</p>
</div>

<div id="ui">
  <h2>⚛ ModelGPU2</h2>
  <div class="badge">⚡ GPU PHYSICS</div>
  <div id="status">Initialising…</div>
  <div class="stat">Objects <span id="count">0</span></div>
  <div class="stat">FPS     <span id="fps">0</span></div>
  <hr class="divider">
  <label>Gravity: <span id="gravLabel">9.8</span></label>
  <input type="range" id="gravSlider" min="0" max="30" step="0.5" value="9.8">
  <label>Restitution (bounce): <span id="restLabel">0.75</span></label>
  <input type="range" id="restSlider" min="0" max="1" step="0.05" value="0.75">
  <label>Friction: <span id="fricLabel">0.995</span></label>
  <input type="range" id="fricSlider" min="0.95" max="1" step="0.001" value="0.995">
  <div class="toggle-row">
    <span class="toggle-label">Show trails</span>
    <button class="toggle" id="trailToggle"></button>
  </div>
  <div id="trailDurationRow" style="display:none">
    <label>Trail duration: <span id="trailDurLabel">1.0</span>s</label>
    <input type="range" id="trailDurSlider" min="0.1" max="10" step="0.1" value="1">
  </div>
  <hr class="divider">
  <label>Number of objects to add</label>
  <input type="number" id="addCount" value="100" min="1">
  <button class="btn btn-primary"   id="addBtn">+ Add Objects</button>
  <button class="btn btn-secondary" id="resetBtn">↺ Reset</button>
  <button class="btn btn-secondary" id="explodeBtn">💥 Explode</button>
</div>
<div id="controls">Drag to rotate · Scroll to zoom · Right-drag to pan</div>

<script>
'use strict';

const statusEl = document.getElementById('status');
function setStatus(msg, ok=true){ statusEl.textContent=msg; statusEl.style.color=ok?'#6ee7b7':'#f87171'; }

// ─── Config ────────────────────────────────────────────────────────────────
const BOX     = { w:14, h:11, d:14 };
const MAX_P   = 8192;
// Particle layout (floats, stride=20):
//  0-3:  px, py, pz, radius
//  4-7:  vx, vy, vz, mass
//  8-11: rot_x, rot_y, rot_z, pad
// 12-15: angv_x, angv_y, angv_z, pad
// 16-19: r, g, b, a
const FS      = 20; // floats per particle
const TPTS    = 128; // trail ring-buffer size per particle

const PALETTE = [
  [1.0,.42,.42],[1.0,.66,.30],[1.0,.83,.23],[.41,.86,.48],
  [.30,.67,.97],[.85,.47,.97],[1.0,.53,.53],[.39,.90,.74],
  [.45,.75,.98],[.97,.51,.67]
];

// ─── WGSL Shaders ─────────────────────────────────────────────────────────

// Shared particle struct definition used in compute shaders
const PARTICLE_STRUCT = `
struct Uniforms {
  dt          : f32,
  gravity     : f32,
  restitution : f32,
  friction    : f32,
  boxW        : f32,
  boxH        : f32,
  boxD        : f32,
  count       : u32,
};
// Flat f32 array, FS=20 floats per particle
@group(0) @binding(0) var<storage, read_write> particles : array<f32>;
@group(0) @binding(1) var<uniform>             u         : Uniforms;
`;

const WGSL_INTEGRATE = PARTICLE_STRUCT + `
@compute @workgroup_size(64)
fn main(@builtin(global_invocation_id) gid : vec3<u32>) {
  let i = gid.x;
  if (i >= u.count) { return; }
  let b = i * 20u;

  let r  = particles[b+3u];
  var px = particles[b+0u]; var py = particles[b+1u]; var pz = particles[b+2u];
  var vx = particles[b+4u]; var vy = particles[b+5u]; var vz = particles[b+6u];

  // Gravity + integrate
  vy -= u.gravity * u.dt;
  px += vx * u.dt; py += vy * u.dt; pz += vz * u.dt;

  // Friction
  vx *= u.friction; vy *= u.friction; vz *= u.friction;

  // Rotation
  particles[b+8u]  += particles[b+12u] * u.dt;
  particles[b+9u]  += particles[b+13u] * u.dt;
  particles[b+10u] += particles[b+14u] * u.dt;
  particles[b+12u] *= 0.999;
  particles[b+13u] *= 0.999;
  particles[b+14u] *= 0.999;

  // Wall bounce
  let wx = u.boxW - r; let wy = u.boxH - r; let wz = u.boxD - r;
  if (px >  wx) { px =  wx; vx = -vx * u.restitution; }
  if (px < -wx) { px = -wx; vx = -vx * u.restitution; }
  if (py >  wy) { py =  wy; vy = -vy * u.restitution; }
  if (py < -wy) { py = -wy; vy = -vy * u.restitution; vx *= 0.98; vz *= 0.98; }
  if (pz >  wz) { pz =  wz; vz = -vz * u.restitution; }
  if (pz < -wz) { pz = -wz; vz = -vz * u.restitution; }

  particles[b+0u]=px; particles[b+1u]=py; particles[b+2u]=pz;
  particles[b+4u]=vx; particles[b+5u]=vy; particles[b+6u]=vz;
}`;

const WGSL_COLLIDE = PARTICLE_STRUCT + `
@compute @workgroup_size(64)
fn main(@builtin(global_invocation_id) gid : vec3<u32>) {
  let i = gid.x;
  if (i >= u.count) { return; }
  let bi = i * 20u;

  var pix = particles[bi+0u]; var piy = particles[bi+1u]; var piz = particles[bi+2u];
  let  ri  = particles[bi+3u];
  var vix = particles[bi+4u]; var viy = particles[bi+5u]; var viz = particles[bi+6u];
  let  mi  = particles[bi+7u];

  for (var j = i + 1u; j < u.count; j++) {
    let bj = j * 20u;
    let pjx = particles[bj+0u]; let pjy = particles[bj+1u]; let pjz = particles[bj+2u];
    let rj  = particles[bj+3u];
    let vjx = particles[bj+4u]; let vjy = particles[bj+5u]; let vjz = particles[bj+6u];
    let mj  = particles[bj+7u];

    let dx=pjx-pix; let dy=pjy-piy; let dz=pjz-piz;
    let d2=dx*dx+dy*dy+dz*dz;
    let md=ri+rj;
    if (d2 >= md*md || d2 < 0.0001) { continue; }

    let dist = sqrt(d2);
    let nx=dx/dist; let ny=dy/dist; let nz=dz/dist;
    let ov=(md-dist)*0.5;

    pix-=nx*ov; piy-=ny*ov; piz-=nz*ov;
    particles[bj+0u]=pjx+nx*ov; particles[bj+1u]=pjy+ny*ov; particles[bj+2u]=pjz+nz*ov;

    let rvn=(vjx-vix)*nx+(vjy-viy)*ny+(vjz-viz)*nz;
    if (rvn >= 0.0) { continue; }
    let imp=-(1.0+u.restitution)*rvn/(1.0/mi+1.0/mj);
    vix-=nx*(imp/mi); viy-=ny*(imp/mi); viz-=nz*(imp/mi);
    particles[bj+4u]=vjx+nx*(imp/mj);
    particles[bj+5u]=vjy+ny*(imp/mj);
    particles[bj+6u]=vjz+nz*(imp/mj);
  }
  particles[bi+0u]=pix; particles[bi+1u]=piy; particles[bi+2u]=piz;
  particles[bi+4u]=vix; particles[bi+5u]=viy; particles[bi+6u]=viz;
}`;

// Render shader — reads particle flat buffer, draws instanced unit sphere
const WGSL_RENDER = `
@group(0) @binding(0) var<storage, read> particles : array<f32>;

struct Camera {
  viewProj : mat4x4<f32>,
  eye      : vec4<f32>,
};
@group(0) @binding(1) var<uniform> cam : Camera;

struct VIn {
  @location(0) lpos : vec3<f32>,
  @location(1) lnrm : vec3<f32>,
  @builtin(instance_index) inst : u32,
};
struct VOut {
  @builtin(position) clip : vec4<f32>,
  @location(0) wpos : vec3<f32>,
  @location(1) wnrm : vec3<f32>,
  @location(2) col  : vec3<f32>,
};

fn rotX(v:vec3<f32>, a:f32)->vec3<f32> { let c=cos(a);let s=sin(a); return vec3(v.x, c*v.y-s*v.z, s*v.y+c*v.z); }
fn rotY(v:vec3<f32>, a:f32)->vec3<f32> { let c=cos(a);let s=sin(a); return vec3(c*v.x+s*v.z, v.y, -s*v.x+c*v.z); }
fn rotZ(v:vec3<f32>, a:f32)->vec3<f32> { let c=cos(a);let s=sin(a); return vec3(c*v.x-s*v.y, s*v.x+c*v.y, v.z); }

@vertex fn vs(in: VIn) -> VOut {
  let b   = in.inst * 20u;
  let pos = vec3<f32>(particles[b+0u], particles[b+1u], particles[b+2u]);
  let rad = particles[b+3u];
  let rx  = particles[b+8u];
  let ry  = particles[b+9u];
  let rz  = particles[b+10u];
  let col = vec3<f32>(particles[b+16u], particles[b+17u], particles[b+18u]);

  var lp = in.lpos * rad;
  var ln = in.lnrm;
  lp = rotX(lp,rx); lp = rotY(lp,ry); lp = rotZ(lp,rz);
  ln = rotX(ln,rx); ln = rotY(ln,ry); ln = rotZ(ln,rz);

  let wp = pos + lp;
  var out : VOut;
  out.clip = cam.viewProj * vec4<f32>(wp, 1.0);
  out.wpos = wp;
  out.wnrm = ln;
  out.col  = col;
  return out;
}

@fragment fn fs(in: VOut) -> @location(0) vec4<f32> {
  let N  = normalize(in.wnrm);
  let V  = normalize(cam.eye.xyz - in.wpos);

  // Key light from upper-right-front
  let L1   = normalize(vec3<f32>(0.5, 0.8, 0.6));
  let H1   = normalize(L1 + V);
  let d1   = max(dot(N, L1), 0.0);
  let s1   = pow(max(dot(N, H1), 0.0), 40.0) * 0.45;

  // Soft fill light from upper-left-back
  let L2   = normalize(vec3<f32>(-0.6, 0.4, -0.5));
  let d2   = max(dot(N, L2), 0.0) * 0.35;

  // Rim light from below-back to prevent total blackness
  let L3   = normalize(vec3<f32>(0.0, -0.5, -1.0));
  let d3   = max(dot(N, L3), 0.0) * 0.15;

  let ambient = 0.20;
  let light   = ambient + d1*0.75 + d2 + d3;
  return vec4<f32>(in.col * light + s1, 1.0);
}`;

const WGSL_TRAIL = `
// Trail point: x,y,z,timestamp, r,g,b,pad  (8 floats each)
@group(0) @binding(0) var<storage, read> trail : array<f32>;
struct Camera { viewProj : mat4x4<f32>, eye : vec4<f32> };
@group(0) @binding(1) var<uniform> cam : Camera;
struct TP { now:f32, duration:f32, pad0:f32, pad1:f32 };
@group(0) @binding(2) var<uniform> tp  : TP;

struct VOut {
  @builtin(position) clip : vec4<f32>,
  @location(0) col : vec4<f32>,
};

@vertex fn vs(@builtin(vertex_index) vi : u32) -> VOut {
  let b    = vi * 8u;
  let wpos = vec3<f32>(trail[b+0u], trail[b+1u], trail[b+2u]);
  let t    = trail[b+3u];
  let col  = vec3<f32>(trail[b+4u], trail[b+5u], trail[b+6u]);
  let age  = clamp((tp.now - t) / tp.duration, 0.0, 1.0);
  let a    = 1.0 - age;
  var out : VOut;
  out.clip = cam.viewProj * vec4<f32>(wpos, 1.0);
  out.col  = vec4<f32>(col * a, a);
  return out;
}
@fragment fn fs(in: VOut) -> @location(0) vec4<f32> { return in.col; }`;

// ─── Wireframe box shader ──────────────────────────────────────────────────
const WGSL_WIRE_TEMPLATE = `
struct Camera { viewProj : mat4x4<f32>, eye : vec4<f32> };
@group(0) @binding(0) var<uniform> cam : Camera;

@vertex fn vs(@builtin(vertex_index) vi : u32) -> @builtin(position) vec4<f32> {
  // 8 corners of the box, then we index into them with a line-list
  // Corners: ±W, ±H, ±D
  var c = array<vec3<f32>, 8>(
    vec3<f32>(-BOX_W, -BOX_H, -BOX_D),
    vec3<f32>( BOX_W, -BOX_H, -BOX_D),
    vec3<f32>( BOX_W,  BOX_H, -BOX_D),
    vec3<f32>(-BOX_W,  BOX_H, -BOX_D),
    vec3<f32>(-BOX_W, -BOX_H,  BOX_D),
    vec3<f32>( BOX_W, -BOX_H,  BOX_D),
    vec3<f32>( BOX_W,  BOX_H,  BOX_D),
    vec3<f32>(-BOX_W,  BOX_H,  BOX_D),
  );
  // 12 edges = 24 indices (line-list)
  var idx = array<u32, 24>(
    0u,1u, 1u,2u, 2u,3u, 3u,0u,  // back face
    4u,5u, 5u,6u, 6u,7u, 7u,4u,  // front face
    0u,4u, 1u,5u, 2u,6u, 3u,7u   // connecting edges
  );
  let pos = c[idx[vi]];
  return cam.viewProj * vec4<f32>(pos, 1.0);
}

@fragment fn fs() -> @location(0) vec4<f32> {
  return vec4<f32>(0.3, 0.2, 0.6, 0.55);  // purple, semi-transparent
}`;

// ─── Math helpers ──────────────────────────────────────────────────────────
function makePerspective(fovY, aspect, near, far) {
  const f  = 1.0 / Math.tan(fovY * 0.5);
  const nf = 1.0 / (near - far);
  // Column-major (each group of 4 = one column)
  return new Float32Array([
    f/aspect,          0,                  0,  0,   // col 0
    0,                 f,                  0,  0,   // col 1
    0,                 0,    (far+near)*nf, -1,   // col 2
    0,                 0, 2*far*near*nf,    0,   // col 3
  ]);
}

function makeLookAt(eye, target, up) {
  const z = norm3(sub3(eye, target));   // forward (reversed)
  const x = norm3(cross3(up, z));       // right
  const y = cross3(z, x);               // up (recomputed)
  // Column-major: col0=x-axis, col1=y-axis, col2=z-axis, col3=translation
  return new Float32Array([
    x[0], x[1], x[2], 0,                 // col 0
    y[0], y[1], y[2], 0,                 // col 1
    z[0], z[1], z[2], 0,                 // col 2
    -dot3(x,eye), -dot3(y,eye), -dot3(z,eye), 1,  // col 3
  ]);
}

function mul4x4(a, b) {
  // Both a and b are column-major Float32Arrays
  // Result[col][row] = sum_k a[k][row] * b[col][k]
  const o = new Float32Array(16);
  for (let col=0; col<4; col++)
    for (let row=0; row<4; row++) {
      let s = 0;
      for (let k=0; k<4; k++) s += a[k*4+row] * b[col*4+k];
      o[col*4+row] = s;
    }
  return o;
}

const sub3  = (a,b) => [a[0]-b[0], a[1]-b[1], a[2]-b[2]];
const dot3  = (a,b) => a[0]*b[0]+a[1]*b[1]+a[2]*b[2];
const cross3= (a,b) => [a[1]*b[2]-a[2]*b[1], a[2]*b[0]-a[0]*b[2], a[0]*b[1]-a[1]*b[0]];
const norm3 = a => { const l=Math.sqrt(dot3(a,a))||1; return [a[0]/l,a[1]/l,a[2]/l]; };

// ─── Build sphere mesh (interleaved pos+normal) ────────────────────────────
function buildSphere(stacks, slices) {
  const pos=[], nrm=[], idx=[];
  for (let i=0; i<=stacks; i++) {
    const phi = Math.PI * i / stacks;
    const sp = Math.sin(phi), cp = Math.cos(phi);
    for (let j=0; j<=slices; j++) {
      const theta = 2*Math.PI * j / slices;
      const x = sp*Math.cos(theta), y = cp, z = sp*Math.sin(theta);
      pos.push(x,y,z); nrm.push(x,y,z);
    }
  }
  for (let i=0; i<stacks; i++)
    for (let j=0; j<slices; j++) {
      const a=i*(slices+1)+j, b=a+slices+1;
      idx.push(a,b,a+1, b,b+1,a+1);
    }
  return {
    pos: new Float32Array(pos),
    nrm: new Float32Array(nrm),
    idx: new Uint16Array(idx),
  };
}

// ─── Main ──────────────────────────────────────────────────────────────────
async function main() {
  // WebGPU availability
  if (!navigator.gpu) {
    document.getElementById('nowebgpu').style.display = 'flex'; return;
  }

  let adapter, device;
  try {
    adapter = await navigator.gpu.requestAdapter({ powerPreference: 'high-performance' });
    if (!adapter) { document.getElementById('nowebgpu').style.display='flex'; return; }
    device  = await adapter.requestDevice();
  } catch(e) {
    setStatus('GPU init failed: ' + e.message, false); return;
  }

  try {
    const info = await adapter.requestAdapterInfo();
    setStatus(info?.description || info?.vendor || 'WebGPU active');
  } catch(_) { setStatus('WebGPU active'); }

  device.lost.then(i => setStatus('Device lost: ' + i.message, false));

  // ── Canvas ────────────────────────────────────────────────────────────────
  const canvas = document.createElement('canvas');
  canvas.width = innerWidth; canvas.height = innerHeight;
  document.body.insertBefore(canvas, document.getElementById('ui'));
  const ctx = canvas.getContext('webgpu');
  const fmt = navigator.gpu.getPreferredCanvasFormat();
  ctx.configure({ device, format: fmt, alphaMode: 'opaque' });

  const makeDepth = () => device.createTexture({
    size: [canvas.width, canvas.height],
    format: 'depth24plus',
    usage: GPUTextureUsage.RENDER_ATTACHMENT,
  });
  let depthTex = makeDepth();

  // ── Sphere mesh ───────────────────────────────────────────────────────────
  const sph = buildSphere(16, 24);

  // Two separate vertex buffers: positions, normals
  const posVBuf = device.createBuffer({ size: sph.pos.byteLength, usage: GPUBufferUsage.VERTEX | GPUBufferUsage.COPY_DST });
  const nrmVBuf = device.createBuffer({ size: sph.nrm.byteLength, usage: GPUBufferUsage.VERTEX | GPUBufferUsage.COPY_DST });
  const idxBuf  = device.createBuffer({ size: sph.idx.byteLength, usage: GPUBufferUsage.INDEX  | GPUBufferUsage.COPY_DST });
  device.queue.writeBuffer(posVBuf, 0, sph.pos);
  device.queue.writeBuffer(nrmVBuf, 0, sph.nrm);
  device.queue.writeBuffer(idxBuf,  0, sph.idx);

  // ── GPU buffers ───────────────────────────────────────────────────────────
  const pBufBytes = MAX_P * FS * 4; // particle storage
  const pBuf = device.createBuffer({ size: pBufBytes, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_SRC | GPUBufferUsage.COPY_DST });
  const rBuf = device.createBuffer({ size: pBufBytes, usage: GPUBufferUsage.MAP_READ | GPUBufferUsage.COPY_DST });

  // Uniforms: 8 floats = 32 bytes (dt,grav,rest,fric,boxW,boxH,boxD,count_as_u32)
  const uBuf = device.createBuffer({ size: 32, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });

  // Camera: mat4 (64 bytes) + vec4 eye (16 bytes) = 80 bytes
  const camBuf = device.createBuffer({ size: 80, usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });

  // Trail: TPTS points * MAX_P particles * 8 floats * 4 bytes
  const trailBytes = TPTS * MAX_P * 8 * 4;
  const trailBuf  = device.createBuffer({ size: trailBytes, usage: GPUBufferUsage.STORAGE | GPUBufferUsage.COPY_DST });
  const trailUBuf = device.createBuffer({ size: 16,         usage: GPUBufferUsage.UNIFORM | GPUBufferUsage.COPY_DST });

  const cpuP      = new Float32Array(MAX_P * FS);
  const trailCPU  = new Float32Array(TPTS * MAX_P * 8);
  const trailHead = new Int32Array(MAX_P);
  const trailCnt  = new Int32Array(MAX_P);
  const trailLast = new Float32Array(MAX_P * 3).fill(1e9);

  // ── Pipelines ─────────────────────────────────────────────────────────────
  // Compute bind group layout: [storage, uniform]
  const computeBGL = device.createBindGroupLayout({ entries: [
    { binding: 0, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'storage' } },
    { binding: 1, visibility: GPUShaderStage.COMPUTE, buffer: { type: 'uniform' } },
  ]});

  const integratePL = device.createComputePipeline({
    layout: device.createPipelineLayout({ bindGroupLayouts: [computeBGL] }),
    compute: { module: device.createShaderModule({ code: WGSL_INTEGRATE }), entryPoint: 'main' },
  });
  const collidePL = device.createComputePipeline({
    layout: device.createPipelineLayout({ bindGroupLayouts: [computeBGL] }),
    compute: { module: device.createShaderModule({ code: WGSL_COLLIDE   }), entryPoint: 'main' },
  });
  const computeBG = device.createBindGroup({ layout: computeBGL, entries: [
    { binding: 0, resource: { buffer: pBuf } },
    { binding: 1, resource: { buffer: uBuf } },
  ]});

  // Render bind group layout: [read-only-storage, uniform]
  const renderBGL = device.createBindGroupLayout({ entries: [
    { binding: 0, visibility: GPUShaderStage.VERTEX,                       buffer: { type: 'read-only-storage' } },
    { binding: 1, visibility: GPUShaderStage.VERTEX | GPUShaderStage.FRAGMENT, buffer: { type: 'uniform' } },
  ]});

  const renMod = device.createShaderModule({ code: WGSL_RENDER });
  const renderPL = device.createRenderPipeline({
    layout: device.createPipelineLayout({ bindGroupLayouts: [renderBGL] }),
    vertex: {
      module: renMod, entryPoint: 'vs',
      buffers: [
        { arrayStride: 12, stepMode: 'vertex', attributes: [{ shaderLocation: 0, offset: 0, format: 'float32x3' }] },
        { arrayStride: 12, stepMode: 'vertex', attributes: [{ shaderLocation: 1, offset: 0, format: 'float32x3' }] },
      ],
    },
    fragment: { module: renMod, entryPoint: 'fs', targets: [{ format: fmt }] },
    primitive: { topology: 'triangle-list', cullMode: 'back' },
    depthStencil: { format: 'depth24plus', depthWriteEnabled: true, depthCompare: 'less' },
  });
  const renderBG = device.createBindGroup({ layout: renderBGL, entries: [
    { binding: 0, resource: { buffer: pBuf   } },
    { binding: 1, resource: { buffer: camBuf } },
  ]});

  // Trail pipeline
  const trailBGL = device.createBindGroupLayout({ entries: [
    { binding: 0, visibility: GPUShaderStage.VERTEX, buffer: { type: 'read-only-storage' } },
    { binding: 1, visibility: GPUShaderStage.VERTEX, buffer: { type: 'uniform' } },
    { binding: 2, visibility: GPUShaderStage.VERTEX, buffer: { type: 'uniform' } },
  ]});
  const trailMod = device.createShaderModule({ code: WGSL_TRAIL });
  const trailPL  = device.createRenderPipeline({
    layout: device.createPipelineLayout({ bindGroupLayouts: [trailBGL] }),
    vertex:   { module: trailMod, entryPoint: 'vs' },
    fragment: { module: trailMod, entryPoint: 'fs', targets: [{ format: fmt, blend: {
      color: { srcFactor:'src-alpha', dstFactor:'one-minus-src-alpha', operation:'add' },
      alpha: { srcFactor:'one',       dstFactor:'one-minus-src-alpha', operation:'add' },
    }}]},
    primitive:    { topology: 'line-strip' },
    depthStencil: { format: 'depth24plus', depthWriteEnabled: false, depthCompare: 'less-equal' },
  });
  const trailBG = device.createBindGroup({ layout: trailBGL, entries: [
    { binding: 0, resource: { buffer: trailBuf  } },
    { binding: 1, resource: { buffer: camBuf    } },
    { binding: 2, resource: { buffer: trailUBuf } },
  ]});

  // ── Wireframe box pipeline ───────────────────────────────────────────────
  const wireWGSL = WGSL_WIRE_TEMPLATE
    .replaceAll('BOX_W', BOX.w.toFixed(1) + 'f')
    .replaceAll('BOX_H', BOX.h.toFixed(1) + 'f')
    .replaceAll('BOX_D', BOX.d.toFixed(1) + 'f');
  const wireBGL = device.createBindGroupLayout({ entries: [
    { binding: 0, visibility: GPUShaderStage.VERTEX, buffer: { type: 'uniform' } },
  ]});
  const wireMod = device.createShaderModule({ code: wireWGSL });
  const wirePL  = device.createRenderPipeline({
    layout: device.createPipelineLayout({ bindGroupLayouts: [wireBGL] }),
    vertex:   { module: wireMod, entryPoint: 'vs' },
    fragment: { module: wireMod, entryPoint: 'fs', targets: [{ format: fmt, blend: {
      color: { srcFactor:'src-alpha', dstFactor:'one-minus-src-alpha', operation:'add' },
      alpha: { srcFactor:'one',       dstFactor:'one-minus-src-alpha', operation:'add' },
    }}]},
    primitive:    { topology: 'line-list' },
    depthStencil: { format: 'depth24plus', depthWriteEnabled: false, depthCompare: 'less-equal' },
  });
  const wireBG = device.createBindGroup({ layout: wireBGL, entries: [
    { binding: 0, resource: { buffer: camBuf } },
  ]});

  // ── Sim state ─────────────────────────────────────────────────────────────
  let numP = 0;
  let trailEnabled=false, trailDuration=1.0;
  let GRAVITY=9.8, RESTITUTION=0.75, FRICTION=0.995;

  function spawn(n) {
    const end = Math.min(numP + n, MAX_P);
    for (let i = numP; i < end; i++) {
      const r   = 0.3 + Math.random() * 0.45;
      const col = PALETTE[Math.floor(Math.random() * PALETTE.length)];
      const b   = i * FS;
      cpuP[b+0]  = (Math.random()-0.5) * BOX.w * 1.6;
      cpuP[b+1]  = BOX.h*0.3 + Math.random()*BOX.h*0.6;
      cpuP[b+2]  = (Math.random()-0.5) * BOX.d * 1.6;
      cpuP[b+3]  = r;
      cpuP[b+4]  = (Math.random()-0.5)*8;
      cpuP[b+5]  = (Math.random()-0.5)*4;
      cpuP[b+6]  = (Math.random()-0.5)*8;
      cpuP[b+7]  = r*r*r;
      cpuP[b+8]  = Math.random()*Math.PI*2;
      cpuP[b+9]  = Math.random()*Math.PI*2;
      cpuP[b+10] = Math.random()*Math.PI*2;
      cpuP[b+11] = 0;
      cpuP[b+12] = (Math.random()-0.5)*3;
      cpuP[b+13] = (Math.random()-0.5)*3;
      cpuP[b+14] = (Math.random()-0.5)*3;
      cpuP[b+15] = 0;
      cpuP[b+16] = col[0]; cpuP[b+17]=col[1]; cpuP[b+18]=col[2]; cpuP[b+19]=1;
    }
    numP = end;
    // Write only the new particles (byteOffset, byteLength)
    device.queue.writeBuffer(pBuf, 0, cpuP, 0, numP * FS); // writeBuffer(buf, bufOffset, data, dataOffset_in_elements, length_in_elements)
  }

  function resetSim() {
    numP = 0; cpuP.fill(0);
    trailCPU.fill(0); trailHead.fill(0); trailCnt.fill(0); trailLast.fill(1e9);
    spawn(100);
  }

  // ── Uniforms ──────────────────────────────────────────────────────────────
  function writeUniforms(dt) {
    const d = new Float32Array(8);
    d[0]=dt; d[1]=GRAVITY; d[2]=RESTITUTION; d[3]=FRICTION;
    d[4]=BOX.w; d[5]=BOX.h; d[6]=BOX.d;
    // Write count as u32 into the same buffer at offset 7*4=28
    new Uint32Array(d.buffer)[7] = numP;
    device.queue.writeBuffer(uBuf, 0, d);
  }

  // ── Camera ────────────────────────────────────────────────────────────────
  const cam = { theta: 0.5, phi: 1.0, r: 32, pan: [0, 0, 0] };
  function getEye() {
    return [
      cam.r * Math.sin(cam.phi) * Math.sin(cam.theta),
      cam.r * Math.cos(cam.phi),
      cam.r * Math.sin(cam.phi) * Math.cos(cam.theta),
    ];
  }
  function writeCamera() {
    const eye  = getEye();
    const view = makeLookAt(eye, cam.pan, [0,1,0]);
    const proj = makePerspective(Math.PI/3, canvas.width/canvas.height, 0.1, 300);
    const vp   = mul4x4(proj, view);
    const d    = new Float32Array(20);
    d.set(vp, 0);
    d[16]=eye[0]; d[17]=eye[1]; d[18]=eye[2]; d[19]=1;
    device.queue.writeBuffer(camBuf, 0, d);
  }

  // ── Orbit controls ────────────────────────────────────────────────────────
  let drag=false, rclick=false, mx=0, my=0;
  canvas.addEventListener('mousedown', e => { drag=true; rclick=e.button===2; mx=e.clientX; my=e.clientY; });
  window.addEventListener('mouseup',   () => drag=false);
  window.addEventListener('mousemove', e => {
    if (!drag) return;
    const dx=e.clientX-mx, dy=e.clientY-my; mx=e.clientX; my=e.clientY;
    if (!rclick) {
      cam.theta -= dx*0.007;
      cam.phi    = Math.max(0.05, Math.min(Math.PI-0.05, cam.phi + dy*0.007));
    } else {
      const eye   = getEye();
      const fwd   = norm3(sub3(cam.pan, eye));
      const right = norm3(cross3(fwd, [0,1,0]));
      const up    = cross3(right, fwd);
      for (let k=0; k<3; k++) cam.pan[k] -= right[k]*dx*0.04 - up[k]*dy*0.04;
    }
  });
  canvas.addEventListener('wheel', e => { cam.r = Math.max(5, Math.min(120, cam.r + e.deltaY*0.05)); });
  canvas.addEventListener('contextmenu', e => e.preventDefault());

  // ── Trail readback ────────────────────────────────────────────────────────
  let readPending = false;

  function scheduleReadback(enc) {
    if (readPending || !trailEnabled || numP===0) return;
    readPending = true;
    enc.copyBufferToBuffer(pBuf, 0, rBuf, 0, numP * FS * 4);
  }

  function processReadback(now) {
    if (!readPending || rBuf.mapState === 'pending') return;
    rBuf.mapAsync(GPUMapMode.READ, 0, numP * FS * 4).then(() => {
      const d = new Float32Array(rBuf.getMappedRange(0, numP * FS * 4));
      let dirty = false;
      for (let i=0; i<numP; i++) {
        const b  = i*FS;
        const px=d[b], py=d[b+1], pz=d[b+2];
        const lx=trailLast[i*3], ly=trailLast[i*3+1], lz=trailLast[i*3+2];
        if ((px-lx)**2+(py-ly)**2+(pz-lz)**2 < 0.01) continue;
        const slot = trailHead[i];
        const off  = (i*TPTS + slot) * 8;
        trailCPU[off+0]=px; trailCPU[off+1]=py; trailCPU[off+2]=pz; trailCPU[off+3]=now;
        trailCPU[off+4]=d[b+16]; trailCPU[off+5]=d[b+17]; trailCPU[off+6]=d[b+18]; trailCPU[off+7]=1;
        trailHead[i] = (slot+1) % TPTS;
        trailCnt[i]  = Math.min(trailCnt[i]+1, TPTS);
        trailLast[i*3]=px; trailLast[i*3+1]=py; trailLast[i*3+2]=pz;
        dirty = true;
      }
      rBuf.unmap();
      readPending = false;
      if (dirty) device.queue.writeBuffer(trailBuf, 0, trailCPU, 0, numP * TPTS * 8);
    }).catch(() => { readPending = false; });
  }

  // ── Frame loop ────────────────────────────────────────────────────────────
  let lt=performance.now(), fc=0, ft=0;

  function frame() {
    requestAnimationFrame(frame);
    const nowMs = performance.now();
    const now   = nowMs / 1000;
    const dt    = Math.min((nowMs - lt) / 1000, 0.05);
    lt = nowMs; fc++; ft += dt;
    if (ft >= 0.5) {
      document.getElementById('fps').textContent   = Math.round(fc/ft);
      document.getElementById('count').textContent = numP;
      fc=0; ft=0;
    }

    if (numP === 0) { renderer(now); return; } // nothing to simulate yet

    writeUniforms(dt);
    writeCamera();
    if (trailEnabled) device.queue.writeBuffer(trailUBuf, 0, new Float32Array([now, trailDuration, 0, 0]));

    const enc = device.createCommandEncoder();

    // Compute passes
    const cp = enc.beginComputePass();
    cp.setBindGroup(0, computeBG);
    cp.setPipeline(integratePL);
    cp.dispatchWorkgroups(Math.ceil(numP/64));
    cp.setPipeline(collidePL);
    cp.dispatchWorkgroups(Math.ceil(numP/64));
    cp.end();

    if (trailEnabled) scheduleReadback(enc);

    // Render pass
    const tv = ctx.getCurrentTexture().createView();
    const rp = enc.beginRenderPass({
      colorAttachments: [{ view: tv, loadOp:'clear', clearValue:{r:.039,g:.039,b:.059,a:1}, storeOp:'store' }],
      depthStencilAttachment: { view: depthTex.createView(), depthLoadOp:'clear', depthClearValue:1, depthStoreOp:'store' },
    });

    rp.setPipeline(renderPL);
    rp.setBindGroup(0, renderBG);
    rp.setVertexBuffer(0, posVBuf);
    rp.setVertexBuffer(1, nrmVBuf);
    rp.setIndexBuffer(idxBuf, 'uint16');
    rp.drawIndexed(sph.idx.length, numP, 0, 0, 0);

    if (trailEnabled && numP > 0) {
      rp.setPipeline(trailPL);
      rp.setBindGroup(0, trailBG);
      for (let i=0; i<numP; i++) {
        const cnt = trailCnt[i]; if (cnt < 2) continue;
        const oldest = (trailHead[i] - cnt + TPTS) % TPTS;
        const end2   = oldest + cnt;
        if (end2 <= TPTS) {
          rp.draw(cnt, 1, i*TPTS + oldest, 0);
        } else {
          rp.draw(TPTS-oldest, 1, i*TPTS+oldest, 0);
          if (end2-TPTS > 1) rp.draw(end2-TPTS, 1, i*TPTS, 0);
        }
      }
    }

    // Wireframe box
    rp.setPipeline(wirePL);
    rp.setBindGroup(0, wireBG);
    rp.draw(24, 1, 0, 0);

    rp.end();
    device.queue.submit([enc.finish()]);
    if (trailEnabled) processReadback(now);
  }

  function renderer(now) {
    // Blank frame when numP=0
    writeCamera();
    const enc = device.createCommandEncoder();
    const tv  = ctx.getCurrentTexture().createView();
    const rp  = enc.beginRenderPass({
      colorAttachments: [{ view:tv, loadOp:'clear', clearValue:{r:.039,g:.039,b:.059,a:1}, storeOp:'store' }],
      depthStencilAttachment: { view:depthTex.createView(), depthLoadOp:'clear', depthClearValue:1, depthStoreOp:'store' },
    });
    rp.setPipeline(wirePL);
    rp.setBindGroup(0, wireBG);
    rp.draw(24, 1, 0, 0);
    rp.end();
    device.queue.submit([enc.finish()]);
  }

  resetSim();
  frame();

  // ── UI ────────────────────────────────────────────────────────────────────
  document.getElementById('addBtn').onclick    = () => spawn(Math.max(1, parseInt(document.getElementById('addCount').value)||1));
  document.getElementById('resetBtn').onclick  = resetSim;
  document.getElementById('explodeBtn').onclick = () => {
    device.queue.submit([]);
    const enc2 = device.createCommandEncoder();
    enc2.copyBufferToBuffer(pBuf, 0, rBuf, 0, numP*FS*4);
    device.queue.submit([enc2.finish()]);
    rBuf.mapAsync(GPUMapMode.READ, 0, numP*FS*4).then(() => {
      const d = new Float32Array(rBuf.getMappedRange(0, numP*FS*4));
      cpuP.set(d.subarray(0, numP*FS));
      rBuf.unmap();
      for (let i=0; i<numP; i++) {
        const b  = i*FS;
        const px=cpuP[b], py=cpuP[b+1], pz=cpuP[b+2];
        const l  = Math.sqrt(px*px+py*py+pz*pz)||1;
        const f  = 14 + Math.random()*8;
        cpuP[b+4] += px/l*f; cpuP[b+5] += py/l*f + 6; cpuP[b+6] += pz/l*f;
      }
      device.queue.writeBuffer(pBuf, 0, cpuP, 0, numP*FS);
    });
  };

  const trailToggle = document.getElementById('trailToggle');
  trailToggle.onclick = () => {
    trailEnabled = !trailEnabled;
    trailToggle.classList.toggle('on', trailEnabled);
    document.getElementById('trailDurationRow').style.display = trailEnabled ? 'block' : 'none';
    if (!trailEnabled) { trailCPU.fill(0); trailHead.fill(0); trailCnt.fill(0); trailLast.fill(1e9); }
  };
  document.getElementById('trailDurSlider').oninput = e => {
    trailDuration = parseFloat(e.target.value);
    document.getElementById('trailDurLabel').textContent = trailDuration.toFixed(1);
  };

  document.getElementById('gravSlider').oninput = e => { GRAVITY     = parseFloat(e.target.value); document.getElementById('gravLabel').textContent = GRAVITY.toFixed(1);     };
  document.getElementById('restSlider').oninput = e => { RESTITUTION = parseFloat(e.target.value); document.getElementById('restLabel').textContent = RESTITUTION.toFixed(2); };
  document.getElementById('fricSlider').oninput = e => { FRICTION    = parseFloat(e.target.value); document.getElementById('fricLabel').textContent = FRICTION.toFixed(3);    };

  window.addEventListener('resize', () => {
    canvas.width=innerWidth; canvas.height=innerHeight;
    depthTex.destroy(); depthTex = makeDepth();
    ctx.configure({ device, format: fmt, alphaMode: 'opaque' });
  });
}

main().catch(e => setStatus('Fatal: ' + e.message, false));
</script>
</body>
</html>
